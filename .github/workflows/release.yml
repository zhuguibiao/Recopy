name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build"
        required: true
        type: choice
        options:
          - all
          - macOS-arm64
          - macOS-x64
          - Windows-x64

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          ALL='[
            {"name":"macOS-arm64","os":"macos-latest","target":"aarch64-apple-darwin","bundles":"app,dmg"},
            {"name":"macOS-x64","os":"macos-latest","target":"x86_64-apple-darwin","bundles":"app,dmg"},
            {"name":"Windows-x64","os":"windows-latest","target":"x86_64-pc-windows-msvc","bundles":"nsis"}
          ]'

          if [[ "${{ github.event_name }}" == "push" || "${{ inputs.platform }}" == "all" ]]; then
            echo "matrix={\"include\":$(echo "$ALL" | jq -c .)}" >> $GITHUB_OUTPUT
          else
            PLATFORM="${{ inputs.platform }}"
            echo "matrix={\"include\":$(echo "$ALL" | jq -c --arg p "$PLATFORM" '[.[] | select(.name == $p)]')}" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build (${{ matrix.name }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      - name: Build Tauri app (release)
        if: github.event_name == 'push'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Recopy ${{ github.ref_name }}"
          releaseBody: |
            ## Downloads

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `Recopy_x.x.x_aarch64.dmg` |
            | macOS (Intel) | `Recopy_x.x.x_x64.dmg` |
            | Windows (64-bit) | `Recopy_x.x.x_x64-setup.exe` |

            > **macOS note:** The app is not notarized yet. On first launch, right-click the app → Open, then confirm. See [Installation Guide](https://github.com/shiqkuangsan/Recopy/blob/main/docs/macos-unsigned-app.md).

            ## What's New

            <!-- Replace with actual changelog before publishing -->
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Build Tauri app (test)
        if: github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          includeUpdaterJson: true
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Upload build artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
          retention-days: 7

  sync-gitee:
    name: Sync Release to Gitee
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download GitHub Release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir -p /tmp/release
          gh release download "$TAG" -R shiqkuangsan/Recopy -D /tmp/release
          echo "Downloaded assets:"
          ls -lh /tmp/release/

      - name: Generate Gitee latest.json
        run: |
          TAG="${GITHUB_REF_NAME}"
          cd /tmp/release
          # Replace GitHub download URLs with Gitee equivalents (same path structure)
          sed -i 's|https://github.com/shiqkuangsan/Recopy/releases/download/|https://gitee.com/shiqkuangsan/Recopy/releases/download/|g' latest.json
          echo "Gitee latest.json:"
          cat latest.json

      - name: Create Gitee Release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          # Create Release via Gitee API
          RELEASE_ID=$(curl -sf -X POST "https://gitee.com/api/v5/repos/shiqkuangsan/Recopy/releases" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg token "$GITEE_TOKEN" \
              --arg tag "$TAG" \
              --arg name "Recopy $TAG" \
              --arg body "Release $TAG — see [GitHub Release](https://github.com/shiqkuangsan/Recopy/releases/tag/$TAG) for full notes." \
              '{access_token: $token, tag_name: $tag, name: $name, body: $body, target_commitish: "main"}'
            )" | jq -r '.id')

          echo "Created Gitee Release ID: $RELEASE_ID"

          # Upload all assets except latest.json (it goes to the updater branch)
          for file in /tmp/release/*; do
            [ -f "$file" ] || continue
            fname=$(basename "$file")
            [ "$fname" = "latest.json" ] && continue
            echo "Uploading $fname..."
            curl -sf -X POST \
              "https://gitee.com/api/v5/repos/shiqkuangsan/Recopy/releases/${RELEASE_ID}/attach_files" \
              -F "access_token=${GITEE_TOKEN}" \
              -F "file=@${file}" > /dev/null
            echo "  ✓ $fname"
          done

      - name: Push latest.json to updater branch
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          cd /tmp
          git init gitee-updater
          cd gitee-updater
          cp /tmp/release/latest.json .
          git add latest.json
          git -c user.name="github-actions" -c user.email="actions@github.com" \
            commit -m "update latest.json for ${GITHUB_REF_NAME}"
          git branch -M updater
          git remote add origin "https://shiqkuangsan:${GITEE_TOKEN}@gitee.com/shiqkuangsan/Recopy.git"
          git push -f origin updater
          echo "✓ Pushed latest.json to gitee.com/shiqkuangsan/Recopy/raw/updater/latest.json"

  update-cask:
    name: Update Homebrew Cask
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger homebrew-recopy update
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh workflow run update-cask.yml \
            -R shiqkuangsan/homebrew-recopy \
            -f version="$VERSION"
